<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PC Specs</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:       #0d0d0d;
    --surface:  #141414;
    --border:   #2a2a2a;
    --accent:   #00e5ff;
    --accent2:  #7c3aed;
    --text:     #e2e2e2;
    --muted:    #555;
    --green:    #22c55e;
    --red:      #ef4444;
    --optimize: #00e5ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
  }
  header .logo {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  header .logo span { color: var(--muted); }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  /* ── LIST ── */
  #list-view h2 {
    font-size: 0.75rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 24px;
  }

  .pc-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
    padding: 18px 22px;
    margin-bottom: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: border-color 0.15s, background 0.15s;
  }
  .pc-card:hover { border-left-color: var(--accent2); background: #1a1a1a; }
  .pc-card .pc-name { font-size: 1rem; font-weight: 700; color: var(--accent); }
  .pc-card .pc-meta { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }
  .pc-card .arrow { color: var(--muted); font-size: 1.2rem; transition: color 0.15s; }
  .pc-card:hover .arrow { color: var(--accent); }

  .empty {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 60px;
    line-height: 2;
  }
  .empty .hint { color: var(--accent); font-size: 0.75rem; margin-top: 8px; }

  /* ── DETAIL ── */
  #detail-view { display: none; }

  .back-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    padding: 7px 16px;
    border-radius: 4px;
    cursor: pointer;
    margin-bottom: 28px;
    transition: border-color 0.15s, color 0.15s;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  .detail-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .detail-header h1 { font-size: 1.4rem; color: var(--accent); font-weight: 700; letter-spacing: 1px; }
  .detail-header .detail-date { font-size: 0.72rem; color: var(--muted); }

  .report-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 24px;
    overflow-x: auto;
    margin-bottom: 24px;
  }
  .report-box pre {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    line-height: 1.75;
    color: var(--text);
    white-space: pre;
  }

  .line-header  { color: var(--accent); font-weight: 700; }
  .line-section { color: var(--accent2); font-weight: 600; }
  .line-key     { color: #94a3b8; }
  .line-value   { color: var(--text); }
  .line-border  { color: var(--border); }

  /* ── OPTIMIZE BUTTON ── */
  .optimize-btn {
    display: block;
    width: 100%;
    padding: 16px;
    background: var(--optimize);
    color: #000;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 24px;
    transition: opacity 0.15s, transform 0.1s;
  }
  .optimize-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .optimize-btn:active { transform: translateY(0); }
  .optimize-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ── AI ANALYSIS PANEL ── */
  #ai-panel { display: none; }

  .ai-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .ai-header h2 {
    font-size: 0.85rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--optimize);
  }
  .ai-badge {
    font-size: 0.65rem;
    background: var(--optimize);
    color: #000;
    padding: 2px 8px;
    border-radius: 99px;
    font-weight: 700;
  }

  .ai-box {
    background: var(--surface);
    border: 1px solid var(--optimize);
    border-radius: 6px;
    padding: 24px;
  }

  /* Markdown-like rendering for AI response */
  .ai-content { font-size: 0.82rem; line-height: 1.85; color: var(--text); }
  .ai-content h2 {
    color: var(--optimize);
    font-size: 0.9rem;
    margin: 24px 0 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid #2a2a2a;
  }
  .ai-content h2:first-child { margin-top: 0; }
  .ai-content h3 { color: var(--accent); font-size: 0.82rem; margin: 16px 0 8px; }
  .ai-content p { margin-bottom: 10px; }
  .ai-content ul, .ai-content ol { padding-left: 20px; margin-bottom: 10px; }
  .ai-content li { margin-bottom: 4px; }
  .ai-content code {
    background: #1e1e1e;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--accent);
  }
  .ai-content pre {
    background: #1e1e1e;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    overflow-x: auto;
    margin: 10px 0;
  }
  .ai-content pre code {
    background: none;
    border: none;
    padding: 0;
    color: #a8ff78;
    font-size: 0.78rem;
  }
  .ai-content strong { color: #fff; font-weight: 700; }
  .ai-content blockquote {
    border-left: 3px solid var(--optimize);
    padding-left: 14px;
    color: var(--muted);
    margin: 10px 0;
    font-style: italic;
  }

  /* ── LOADING ── */
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  .spinner.orange { border-top-color: var(--optimize); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-msg { color: var(--muted); font-size: 0.82rem; margin-top: 40px; }
</style>
</head>
<body>

<header>
  <div class="logo">PC<span>/</span>SPECS</div>
</header>

<main>
  <!-- LIST -->
  <div id="list-view">
    <h2>// Machines</h2>
    <div id="pc-list"><p class="loading-msg"><span class="spinner"></span>Loading...</p></div>
  </div>

  <!-- DETAIL -->
  <div id="detail-view">
    <button class="back-btn" onclick="showList()">← Back</button>
    <div class="detail-header">
      <h1 id="detail-name"></h1>
      <span class="detail-date" id="detail-date"></span>
    </div>

    <!-- Specs -->
    <div class="report-box">
      <pre id="detail-content"></pre>
    </div>

    <!-- Optimize Button -->
    <button class="optimize-btn" id="optimize-btn" onclick="runOptimize()">
      ⚡ OPTIMIZE
    </button>

    <!-- AI Panel -->
    <div id="ai-panel">
      <div class="ai-header">
        <h2>// AI Analysis</h2>
        <span class="ai-badge">Claude AI</span>
      </div>
      <div class="ai-box">
        <div class="ai-content" id="ai-content"></div>
      </div>
    </div>
  </div>
</main>

<script>
const listView   = document.getElementById('list-view');
const detailView = document.getElementById('detail-view');
const pcList     = document.getElementById('pc-list');
let currentSpecs = '';

async function loadList() {
  try {
    const res  = await fetch('/api/list');
    const data = await res.json();

    if (!data.length) {
      pcList.innerHTML = `
        <div class="empty">
          No machines found.<br>
          <span class="hint">Run the PowerShell script on a PC to add it here.</span>
        </div>`;
      return;
    }

    pcList.innerHTML = data.map(pc => `
      <div class="pc-card" onclick="loadDetail('${escHtml(pc.pcName)}')">
        <div>
          <div class="pc-name">${escHtml(pc.pcName)}</div>
          <div class="pc-meta">Last update: ${formatDate(pc.updatedAt)}</div>
        </div>
        <span class="arrow">›</span>
      </div>
    `).join('');
  } catch {
    pcList.innerHTML = `<p class="loading-msg" style="color:var(--red)">Error loading list.</p>`;
  }
}

async function loadDetail(pcName) {
  detailView.style.display = 'block';
  listView.style.display   = 'none';

  document.getElementById('detail-name').textContent    = pcName;
  document.getElementById('detail-date').textContent    = '';
  document.getElementById('detail-content').innerHTML   = '<span class="spinner"></span> Loading...';
  document.getElementById('ai-panel').style.display     = 'none';
  document.getElementById('ai-content').innerHTML       = '';
  document.getElementById('optimize-btn').disabled      = false;
  document.getElementById('optimize-btn').textContent   = '⚡ OPTIMIZE';
  currentSpecs = '';

  try {
    const res  = await fetch(`/api/pc/${encodeURIComponent(pcName)}`);
    const data = await res.json();

    document.getElementById('detail-date').textContent  = `Updated: ${formatDate(data.updatedAt)}`;
    document.getElementById('detail-content').innerHTML = colorize(data.content || '');
    currentSpecs = data.content || '';
  } catch {
    document.getElementById('detail-content').textContent = 'Error loading report.';
  }
}

async function runOptimize() {
  if (!currentSpecs) return;

  const btn = document.getElementById('optimize-btn');
  const panel = document.getElementById('ai-panel');
  const content = document.getElementById('ai-content');

  btn.disabled    = true;
  btn.innerHTML   = '<span class="spinner orange"></span> Analyzing...';
  panel.style.display = 'block';
  content.innerHTML   = '<span class="spinner orange"></span> Claude is analyzing your system specs...';

  try {
    const res = await fetch('/api/optimize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ specs: currentSpecs }),
    });

    const data = await res.json();

    if (data.error) {
      content.innerHTML = `<span style="color:var(--red)">Error: ${escHtml(JSON.stringify(data.error))}</span>`;
      btn.disabled = false;
      btn.textContent = '⚡ OPTIMIZE';
      return;
    }

    content.innerHTML = renderMarkdown(data.result || '');
    btn.textContent   = '✓ ANALYSIS COMPLETE';

  } catch (e) {
    content.innerHTML = `<span style="color:var(--red)">Error contacting API.</span>`;
    btn.disabled    = false;
    btn.textContent = '⚡ OPTIMIZE';
  }
}

function showList() {
  detailView.style.display = 'none';
  listView.style.display   = 'block';
}

// Simple markdown renderer
function renderMarkdown(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    // code blocks
    .replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    // inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // h2
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    // h3
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    // bold
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    // blockquote
    .replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
    // unordered list
    .replace(/^\s*[-*] (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    // ordered list
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    // paragraphs (double newline)
    .replace(/\n\n+/g, '</p><p>')
    .replace(/^(?!<[hup])(.+)$/gm, (m) => m.trim() ? m : '')
    // wrap in p
    .replace(/^([^<\n].+)$/gm, '<p>$1</p>')
    // cleanup empty p tags
    .replace(/<p><\/p>/g, '')
    .replace(/<p>(<[hup])/g, '$1')
    .replace(/(<\/[hup][^>]*>)<\/p>/g, '$1');
}

function colorize(text) {
  return text.split('\n').map(line => {
    const e = escHtml(line);
    if (/^[╔╠╚║]/.test(line))               return `<span class="line-header">${e}</span>`;
    if (/^={3,}/.test(line.trim()))          return `<span class="line-border">${e}</span>`;
    if (/^\s{2}[A-Z\s]{3,}\s*$/.test(line)) return `<span class="line-section">${e}</span>`;
    if (/^\s+\w[\w\s()]+\s*:/.test(line)) {
      return e.replace(/^(\s*)([\w\s()#_\-]+?)(\s*:\s*)(.*)$/,
        (_, sp, k, sep, v) =>
          `${sp}<span class="line-key">${k}${sep}</span><span class="line-value">${v}</span>`
      );
    }
    return e;
  }).join('\n');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatDate(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleString('it-IT', { dateStyle:'medium', timeStyle:'short' }); }
  catch { return iso; }
}

loadList();
</script>
</body>
</html>
